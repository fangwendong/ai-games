# IBC configuration for IB Gateway Paper Trading.
# Keep this file readable only by the service user if credentials are added.

FIX=no

# Fill these in only after deciding how to store credentials.
# Leaving them blank means Gateway will show the login dialog.
IbLoginId=
IbPassword=

FIXLoginId=
FIXPassword=

SecondFactorDevice=
ReloginAfterSecondFactorAuthenticationTimeout=no
SecondFactorAuthenticationExitInterval=
SecondFactorAuthenticationTimeout=180
ExitAfterSecondFactorAuthenticationTimeout=no

TradingMode=paper
AcceptNonBrokerageAccountWarning=yes
LoginDialogDisplayTimeout=60

IbDir=
StoreSettingsOnServer=
MinimizeMainWindow=no
ExistingSessionDetectedAction=manual

# Paper IB Gateway default API port.
OverrideTwsApiPort=4002
OverrideTwsMasterClientID=

# Start with writable API only after Paper account is confirmed.
# The bot itself still defaults to dry-run.
ReadOnlyLogin=no
ReadOnlyApi=no

BypassOrderPrecautions=
BypassBondWarning=
BypassNegativeYieldToWorstConfirmation=
BypassCalledBondWarning=
BypassSameActionPairTradeWarning=
BypassPriceBasedVolatilityRiskWarning=
BypassUSStocksMarketDataInSharesWarning=
BypassRedirectOrderWarning=
BypassNoOverfillProtectionPrecaution=

UseSSL=yes
SaveTwsSettingsAt=
LogToConsole=yes

