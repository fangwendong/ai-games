<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>密室逃脱</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #e9ecef;
      --panel: rgba(255, 255, 255, 0.86);
      --line: rgba(34, 42, 52, 0.14);
      --ink: #1f2a33;
      --muted: #60707e;
      --accent: #2f6fed;
      --accent-2: #0f9d7a;
      --warn: #d19a00;
      --bad: #c74848;
      --shadow: 0 18px 48px rgba(22, 30, 41, 0.14);
      --room-w: min(48vw, 560px);
      --room-h: min(58vw, 480px);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(47, 111, 237, 0.14), transparent 28%),
        radial-gradient(circle at 82% 0%, rgba(15, 157, 122, 0.14), transparent 26%),
        linear-gradient(180deg, #f5f7fa 0%, var(--bg) 100%);
    }

    body {
      padding: 18px;
    }

    button, input {
      font: inherit;
    }

    .app {
      width: min(1220px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(300px, 1fr) 340px;
      gap: 18px;
      align-items: start;
    }

    .stage, .side {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .stage {
      min-height: calc(100vh - 36px);
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 10px;
      min-height: 34px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.66);
      font-size: 13px;
      white-space: nowrap;
    }

    .chip strong {
      color: var(--accent);
      font-weight: 800;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .guide {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .guide-step {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .guide-step strong {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #1f2a33;
      color: #fff;
      font-size: 12px;
    }

    .btn {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf2;
      color: var(--ink);
      cursor: pointer;
      font-weight: 800;
      box-shadow: inset 0 -3px 0 rgba(34, 42, 52, 0.06);
    }

    .btn.primary {
      background: #1f2a33;
      color: #fff;
      border-color: rgba(31, 42, 51, 0.68);
    }

    .room {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 14px;
      align-items: start;
    }

    .scene, .panel {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      overflow: hidden;
    }

    .scene {
      position: relative;
      aspect-ratio: 560 / 480;
      background:
        linear-gradient(180deg, rgba(47, 111, 237, 0.07), transparent 40%),
        linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.12) 100%),
        #d8e1eb;
    }

    .scene-guide {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 3;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      color: #2f6fed;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 6px 20px rgba(31, 42, 51, 0.14);
      pointer-events: none;
    }

    .scene-canvas {
      position: absolute;
      inset: 0;
      width: 560px;
      height: 480px;
      transform-origin: top left;
    }

    .wall {
      position: absolute;
      inset: 14px;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0)),
        linear-gradient(135deg, rgba(55, 68, 82, 0.08), transparent 35%),
        linear-gradient(45deg, rgba(255, 255, 255, 0.18), transparent 28%);
      box-shadow: inset 0 0 0 2px rgba(50, 60, 74, 0.08);
    }

    .floor {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      height: 26%;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0)),
        linear-gradient(180deg, #b7c2cf, #9eacb8);
    }

    .door {
      position: absolute;
      right: 26px;
      top: 72px;
      width: 120px;
      height: 230px;
      border-radius: 18px 18px 12px 12px;
      background: linear-gradient(180deg, #7d6147 0%, #654c37 100%);
      box-shadow: inset 0 0 0 8px rgba(0, 0, 0, 0.06);
    }

    .door.locked::after {
      content: "锁";
      position: absolute;
      left: 50%;
      top: 96px;
      transform: translateX(-50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #f5dd96;
      color: #5b4300;
      font-weight: 900;
      font-size: 20px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
    }

    .door.open {
      background: linear-gradient(180deg, #9bc7ae 0%, #6da786 100%);
    }

    .door.open::after {
      content: "门开了";
      position: absolute;
      left: 50%;
      top: 98px;
      transform: translateX(-50%);
      color: #fff;
      font-weight: 900;
      font-size: 18px;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
    }

    .hotspot {
      position: absolute;
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      overflow: visible;
    }

    .hotspot::before {
      content: "可点";
      position: absolute;
      right: 6px;
      top: 6px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      color: #2f6fed;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      z-index: 2;
      pointer-events: none;
    }

    .hotspot::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 8px;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.16) inset;
      animation: cluePulse 1.8s ease-in-out infinite;
    }

    .hotspot:hover::after {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    .hotspot.active::after {
      background: rgba(47, 111, 237, 0.16);
      box-shadow: 0 0 0 2px rgba(47, 111, 237, 0.34);
    }

    .label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -24px;
      font-size: 11px;
      color: #31414f;
      text-align: center;
      font-weight: 700;
      white-space: nowrap;
    }

    .item {
      position: absolute;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(31, 42, 51, 0.14);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.76));
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      color: #20303d;
      user-select: none;
    }

    .item::after {
      content: attr(data-emoji);
      font-size: 28px;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.4);
    }

    .item.big::after { font-size: 30px; }

    .bookcase {
      left: 28px;
      top: 54px;
      width: 124px;
      height: 230px;
      background:
        linear-gradient(180deg, #a7b7c8 0 2px, transparent 2px 25%, #a7b7c8 25% 27%, transparent 27% 50%, #a7b7c8 50% 52%, transparent 52% 75%, #a7b7c8 75% 77%, transparent 77% 100%),
        linear-gradient(90deg, #8e9fb0 0 10px, #c4d0db 10px 114px, #8e9fb0 114px 124px);
    }

    .desk {
      left: 176px;
      bottom: 34px;
      width: 150px;
      height: 78px;
      background: linear-gradient(180deg, #a06c48, #7a4c30);
    }

    .lamp {
      left: 214px;
      top: 54px;
      width: 70px;
      height: 118px;
      background: transparent;
      box-shadow: none;
    }

    .lamp::after {
      content: "💡";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 34px;
      filter: drop-shadow(0 4px 10px rgba(255, 214, 74, 0.48));
    }

    .picture {
      right: 172px;
      top: 52px;
      width: 118px;
      height: 94px;
      background: linear-gradient(180deg, #ffe9c2, #d8a36c);
    }

    .picture::after {
      content: "🖼️";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 32px;
    }

    .plant {
      left: 352px;
      bottom: 56px;
      width: 74px;
      height: 94px;
      background: transparent;
      box-shadow: none;
    }

    .plant::after {
      content: "🪴";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 34px;
    }

    .panel {
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .panel h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel p, .panel ul {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .clue-list {
      display: grid;
      gap: 8px;
    }

    .clue {
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(47, 111, 237, 0.08);
      color: #2f4c77;
      border: 1px solid rgba(47, 111, 237, 0.14);
    }

    .lockbox {
      display: grid;
      gap: 10px;
      padding-top: 4px;
    }

    .lockbox input {
      width: 100%;
      min-height: 46px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      outline: none;
      letter-spacing: 0.12em;
      font-weight: 800;
    }

    .hint {
      padding: 12px;
      border-radius: 8px;
      background: rgba(15, 157, 122, 0.1);
      border: 1px solid rgba(15, 157, 122, 0.16);
      color: #216455;
      min-height: 54px;
    }

    .feed {
      min-height: 54px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(31, 42, 51, 0.06);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(18, 24, 31, 0.42);
      z-index: 20;
      padding: 18px;
    }

    .modal.visible {
      display: grid;
    }

    .modal-card {
      width: min(520px, 100%);
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fffdf8;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .modal-emoji {
      font-size: 64px;
      line-height: 1;
      text-align: center;
      animation: pop 360ms ease;
    }

    .modal-card h3 {
      margin: 0;
      font-size: 22px;
    }

    .modal-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .splash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 19;
      opacity: 0;
      transition: opacity 150ms ease;
    }

    .splash.visible { opacity: 1; }

    .lock-feedback {
      min-height: 24px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    @keyframes pop {
      0% { transform: scale(0.6); opacity: 0; }
      60% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes cluePulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.16) inset; }
      50% { box-shadow: 0 0 0 2px rgba(47, 111, 237, 0.28) inset, 0 0 0 2px rgba(47, 111, 237, 0.08); }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: auto;
      }

      .room {
        grid-template-columns: 1fr;
      }

      :root {
        --room-w: 100%;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .stage {
        padding: 12px;
        gap: 10px;
      }

      .brand h1 {
        font-size: 26px;
      }

      .brand p,
      .chip {
        font-size: 12px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .controls .btn.primary {
        grid-column: 1 / -1;
      }

      .guide {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 12px;
        gap: 10px;
      }

      .panel h2 {
        font-size: 16px;
      }

      .panel p,
      .panel ul,
      .hint,
      .feed {
        font-size: 13px;
        line-height: 1.45;
      }

      .clue-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .scene {
        aspect-ratio: 560 / 420;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage">
      <div class="topbar">
        <div class="brand">
          <h1>密室逃脱</h1>
          <p>每一关都要靠现场线索找密码或开锁方式，开门后进入下一关。</p>
        </div>
        <div class="stats">
          <div class="chip">关卡 <strong id="levelText">1</strong>/8</div>
          <div class="chip">已发现 <strong id="clueText">0</strong>/<strong id="clueTotalText">0</strong></div>
          <div class="chip">状态 <strong id="statusText">搜寻中</strong></div>
        </div>
      </div>

      <div class="controls">
        <button id="hintBtn" class="btn">提示</button>
        <button id="resetBtn" class="btn">重置本关</button>
        <button id="nextBtn" class="btn primary" disabled>下一关</button>
      </div>

      <div class="guide" aria-label="操作指引">
        <div class="guide-step"><strong>1</strong>点发光物件</div>
        <div class="guide-step"><strong>2</strong>把线索记下来</div>
        <div class="guide-step"><strong>3</strong>输入门锁密码</div>
      </div>

      <div class="room">
        <div class="scene" id="scene">
          <div class="scene-guide">房间里 6 个物件都能点，先找最亮的</div>
          <div id="sceneCanvas" class="scene-canvas">
            <div class="wall"></div>
            <div class="floor"></div>
            <div id="door" class="door locked"></div>

            <button class="hotspot item bookcase" data-clue="bookcase" style="left:28px;top:54px;width:124px;height:230px;">
              <span class="label">书架</span>
            </button>
            <button class="hotspot item desk" data-clue="desk" style="left:176px;bottom:34px;width:150px;height:78px;">
              <span class="label">桌子</span>
            </button>
            <button class="hotspot item lamp" data-clue="lamp" style="left:214px;top:54px;width:70px;height:118px;">
              <span class="label">灯</span>
            </button>
            <button class="hotspot item picture" data-clue="picture" style="right:172px;top:52px;width:118px;height:94px;">
              <span class="label">画框</span>
            </button>
            <button class="hotspot item plant" data-clue="plant" style="left:352px;bottom:56px;width:74px;height:94px;">
              <span class="label">绿植</span>
            </button>
            <button class="hotspot item big" data-clue="panel" style="left:160px;top:196px;width:114px;height:68px;background:linear-gradient(180deg,#eef4ff,#cfdcf8);">
              <span class="label">面板</span>
            </button>
          </div>
        </div>

        <div class="panel">
          <div>
            <h2>已知线索</h2>
            <p>点开场景里的物件，把能用的信息拼起来。</p>
          </div>
          <div id="clueList" class="clue-list"></div>
          <div>
            <h2>门锁</h2>
            <div class="lockbox">
              <input id="answerInput" inputmode="text" autocomplete="off" placeholder="输入密码或锁法">
              <div class="modal-actions">
                <button id="submitBtn" class="btn primary">开门</button>
                <button id="clearBtn" class="btn">清空</button>
              </div>
              <div id="lockFeedback" class="lock-feedback"></div>
            </div>
          </div>
          <div class="hint" id="hintBox">提示会显示在这里。</div>
          <div class="feed" id="feed">先看房间，点物件找线索。</div>
        </div>
      </div>
    </section>
  </main>

  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div id="modalEmoji" class="modal-emoji" aria-hidden="true">🙂</div>
      <h3 id="modalTitle">过关</h3>
      <p id="modalBody">门已经打开。</p>
      <div class="modal-actions">
        <button id="modalPrimary" class="btn primary">继续</button>
        <button id="modalSecondary" class="btn">留在本关</button>
      </div>
    </div>
  </div>

  <canvas id="splash" class="splash" aria-hidden="true"></canvas>

  <script>
    const levels = [
      {
        name: "第一关：图书室",
        clueTotal: 6,
        hint: "书架上最上层有 3 本红书，中层有 2 本蓝书。桌上的纸条写着“3 2 5”。",
        clues: {
          bookcase: "书架上红书 3 本，蓝书 2 本，全部加起来是 5。",
          desk: "纸条写着 3 2 5。",
          lamp: "灯罩里藏着数字 5。",
          picture: "画框背后有一行字：先看书架，再看桌子。",
          plant: "花盆底部贴着 5。",
          panel: "门上密码锁需要 3 位数。"
        },
        answer: "325",
        success: "数字按书架红书、蓝书、灯光顺序组合：325。"
      },
      {
        name: "第二关：实验室",
        clueTotal: 6,
        hint: "三只试管分别标了 A、B、C。墙上写着“从左到右：绿、黄、红”。",
        clues: {
          bookcase: "实验柜里试剂瓶有三种颜色：绿、黄、红。",
          desk: "记录本写着 2-1-3。",
          lamp: "灯光照到试管架，左边是绿，中间是黄，右边是红。",
          picture: "图表上 A 对应 2，B 对应 1，C 对应 3。",
          plant: "绿植盆里夹着一张 213。",
          panel: "需要把颜色顺序转成字母。"
        },
        answer: "GYR",
        success: "颜色顺序是绿、黄、红，输入 GYR。"
      },
      {
        name: "第三关：走廊",
        clueTotal: 6,
        hint: "三个开关控制三盏灯，门旁边有图示：第一个和第三个需要打开。",
        clues: {
          bookcase: "走廊墙上贴着 1、2、3 三个开关的说明。",
          desk: "纸条写着：1 和 3 打开，2 关闭。",
          lamp: "灯的颜色变化提示顺序是亮、暗、亮。",
          picture: "画框里画着三个点：● ○ ●。",
          plant: "盆里小卡片写着“101”。",
          panel: "开锁方式不是数字密码，是开关顺序。"
        },
        answer: "101",
        success: "按亮、暗、亮的顺序拨开关。"
      },
      {
        name: "第四关：画室",
        clueTotal: 6,
        hint: "四张画的背面分别写着春、夏、秋、冬，只有顺序对了才开门。",
        clues: {
          bookcase: "书架上季节书签的顺序是春、夏、秋、冬。",
          desk: "桌上四张画编号 4、1、3、2。",
          lamp: "灯光照到画框，顺序是 4132。",
          picture: "画框后写着“先春后冬”。",
          plant: "盆里卡片写着 4132。",
          panel: "需要输入四位顺序码。"
        },
        answer: "4132",
        success: "画框编号顺序是 4-1-3-2。"
      },
      {
        name: "第五关：档案室",
        clueTotal: 6,
        hint: "档案袋按 A1、A2、B1、B2 排列，角落贴了 2 个红点和 1 个蓝点。",
        clues: {
          bookcase: "档案柜上贴着 A、B 两组，每组两个。",
          desk: "桌上便签写着：红、红、蓝。",
          lamp: "灯罩上写的是 2 1 1。",
          picture: "画框背后写着“红点是 2 个”。",
          plant: "绿植旁有三颗小石子，两个红一个蓝。",
          panel: "密码是颜色计数。"
        },
        answer: "221",
        success: "先数红点 2 个，再数蓝点 1 个，再数白点 1 个。"
      },
      {
        name: "第六关：密道",
        clueTotal: 6,
        hint: "地图上箭头指向左、上、右。门锁需要按方向输入。",
        clues: {
          bookcase: "地图边上写着 L、U、R。",
          desk: "纸条上有 → ← ↑。",
          lamp: "灯罩阴影投出方向：左、上、右。",
          picture: "画框里是一条折线，方向依次是左上右。",
          plant: "盆里卡片写着 LUR。",
          panel: "这个锁要输入方向缩写。"
        },
        answer: "LUR",
        success: "方向顺序是左、上、右。"
      },
      {
        name: "第七关：冷库",
        clueTotal: 6,
        hint: "温度表显示 4、1、7，门锁要求把最小数放前面。",
        clues: {
          bookcase: "箱子标签是 7、4、1。",
          desk: "桌上有一张纸：把数字从小到大排。",
          lamp: "灯光照出 4、1、7 三个数字。",
          picture: "画框背后写着 147。",
          plant: "盆里卡片写着 417。",
          panel: "按升序输入三位数。"
        },
        answer: "147",
        success: "把数字从小到大排，得到 147。"
      },
      {
        name: "第八关：终门",
        clueTotal: 6,
        hint: "把前面几关的最终数字串起来，就能开最后的门。",
        clues: {
          bookcase: "书脊写着 3、5、1、4。",
          desk: "桌上有一张总表：325 / GYR / 101 / 4132 / 221 / LUR / 147。",
          lamp: "灯光把总表中每组的首位数字打亮。",
          picture: "画框里写着“看每组的第一个数字”。",
          plant: "盆底有一行字：3 1 1 4。",
          panel: "终门需要输入 3114。"
        },
        answer: "3114",
        success: "把前面几组最终数字的首位连起来：3、1、1、4。"
      }
    ];

    const state = {
      levelIndex: 0,
      opened: new Set(),
      cluesFound: new Set(),
      input: "",
      solved: false,
      modalAction: null,
      splash: null,
      splashFrame: 0
    };

    const els = {
      levelText: document.querySelector("#levelText"),
      clueText: document.querySelector("#clueText"),
      clueTotalText: document.querySelector("#clueTotalText"),
      statusText: document.querySelector("#statusText"),
      scene: document.querySelector("#scene"),
      sceneCanvas: document.querySelector("#sceneCanvas"),
      door: document.querySelector("#door"),
      clueList: document.querySelector("#clueList"),
      answerInput: document.querySelector("#answerInput"),
      submitBtn: document.querySelector("#submitBtn"),
      clearBtn: document.querySelector("#clearBtn"),
      hintBtn: document.querySelector("#hintBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      nextBtn: document.querySelector("#nextBtn"),
      feed: document.querySelector("#feed"),
      hintBox: document.querySelector("#hintBox"),
      lockFeedback: document.querySelector("#lockFeedback"),
      modal: document.querySelector("#modal"),
      modalEmoji: document.querySelector("#modalEmoji"),
      modalTitle: document.querySelector("#modalTitle"),
      modalBody: document.querySelector("#modalBody"),
      modalPrimary: document.querySelector("#modalPrimary"),
      modalSecondary: document.querySelector("#modalSecondary"),
      splash: document.querySelector("#splash"),
      splashCtx: document.querySelector("#splash").getContext("2d")
    };

    const clueNodes = {
      bookcase: document.createElement("div"),
      desk: document.createElement("div"),
      lamp: document.createElement("div"),
      picture: document.createElement("div"),
      plant: document.createElement("div"),
      panel: document.createElement("div")
    };

    function currentLevel() {
      return levels[state.levelIndex];
    }

    function segmentLabel(index) {
      if (index < 2) return `第 ${index + 1} 关`;
      return `第 ${index + 1} 关`;
    }

    function renderClues() {
      const level = currentLevel();
      els.clueList.innerHTML = "";
      const keys = ["bookcase", "desk", "lamp", "picture", "plant", "panel"];
      keys.forEach((key) => {
        const div = document.createElement("div");
        div.className = "clue";
        div.textContent = state.cluesFound.has(key) ? level.clues[key] : "未发现";
        els.clueList.appendChild(div);
      });
      els.clueText.textContent = `${state.cluesFound.size}`;
      els.clueTotalText.textContent = `${level.clueTotal}`;
    }

    function setSceneMessage(text) {
      els.feed.textContent = text;
    }

    function setHint(text) {
      els.hintBox.textContent = text;
    }

    function updateHeader() {
      els.levelText.textContent = `${state.levelIndex + 1}`;
      els.statusText.textContent = state.solved ? "门开了" : "搜寻中";
      els.door.classList.toggle("open", state.solved);
      els.door.classList.toggle("locked", !state.solved);
      els.nextBtn.disabled = !state.solved;
    }

    function resetLevel(keepLevel = true) {
      state.opened.clear();
      state.cluesFound.clear();
      state.input = "";
      state.solved = false;
      els.answerInput.value = "";
      els.lockFeedback.textContent = "";
      els.modal.classList.remove("visible");
      if (!keepLevel) state.levelIndex = 0;
      renderLevel();
    }

    function renderLevel() {
      const level = currentLevel();
      updateHeader();
      renderClues();
      setHint(level.hint);
      if (!state.solved) {
        setSceneMessage(`你进入了${level.name}。场景里有 6 个可点击物件，先点发光的那几个找线索。`);
      }
      document.querySelectorAll(".hotspot").forEach((el) => {
        el.classList.remove("active");
      });
      els.answerInput.placeholder = state.levelIndex === 7 ? "输入密码或开门方式" : "输入密码或开锁方式";
      els.nextBtn.textContent = state.levelIndex === levels.length - 1 ? "通关" : "下一关";
    }

    function openResult(title, body, emoji, primaryLabel, secondaryLabel, onPrimary) {
      els.modalEmoji.textContent = emoji;
      els.modalTitle.textContent = title;
      els.modalBody.textContent = body;
      els.modalPrimary.textContent = primaryLabel;
      els.modalSecondary.textContent = secondaryLabel;
      state.modalAction = onPrimary;
      els.modal.classList.add("visible");
    }

    function closeResult() {
      els.modal.classList.remove("visible");
      state.modalAction = null;
    }

    function resizeSplash() {
      const dpr = window.devicePixelRatio || 1;
      els.splash.width = Math.floor(window.innerWidth * dpr);
      els.splash.height = Math.floor(window.innerHeight * dpr);
      els.splash.style.width = `${window.innerWidth}px`;
      els.splash.style.height = `${window.innerHeight}px`;
      els.splashCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function startSplash(duration, burstCount, colorMode = "mixed") {
      resizeSplash();
      const now = performance.now();
      state.splash = {
        start: now,
        duration,
        particles: [],
        bursts: Array.from({ length: burstCount }, (_, index) => ({
          at: now + index * (duration / burstCount),
          x: window.innerWidth * (0.2 + Math.random() * 0.6),
          y: window.innerHeight * (0.16 + Math.random() * 0.4),
          hue: colorMode === "warm" ? 35 + Math.random() * 20 : Math.random() * 360
        })),
        colorMode
      };
      els.splash.classList.add("visible");
      if (!state.splashFrame) {
        state.splashFrame = window.requestAnimationFrame(stepSplash);
      }
    }

    function resizeScene() {
      const width = els.scene.clientWidth || 560;
      const height = els.scene.clientHeight || 480;
      const scale = Math.min(width / 560, height / 480);
      els.sceneCanvas.style.transform = `scale(${scale})`;
    }

    function stepSplash(timestamp) {
      if (!state.splash) {
        state.splashFrame = 0;
        els.splashCtx.clearRect(0, 0, els.splash.width, els.splash.height);
        els.splash.classList.remove("visible");
        return;
      }
      const { start, duration, bursts, particles, colorMode } = state.splash;
      els.splashCtx.clearRect(0, 0, els.splash.width, els.splash.height);
      while (bursts.length && bursts[0].at <= timestamp) {
        const burst = bursts.shift();
        const count = colorMode === "warm" ? 18 : 32;
        for (let i = 0; i < count; i += 1) {
          const angle = (Math.PI * 2 * i) / count;
          const speed = (colorMode === "warm" ? 1.8 : 3.1) + Math.random() * 2.2;
          particles.push({
            x: burst.x,
            y: burst.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            gravity: colorMode === "warm" ? 0.05 : 0.07,
            life: colorMode === "warm" ? 42 : 56,
            hue: burst.hue + (Math.random() * 16 - 8),
            size: colorMode === "warm" ? 2 : 2.6
          });
        }
      }
      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.life -= 1;
        els.splashCtx.fillStyle = `hsla(${p.hue}, 90%, 62%, ${Math.max(0, p.life / 56)})`;
        els.splashCtx.beginPath();
        els.splashCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        els.splashCtx.fill();
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (timestamp - start > duration && !bursts.length && !particles.length) {
        state.splash = null;
        els.splash.classList.remove("visible");
      } else {
        state.splashFrame = window.requestAnimationFrame(stepSplash);
      }
    }

    function markOpened(key) {
      state.opened.add(key);
      document.querySelectorAll(".hotspot").forEach((node) => {
        if (node.dataset.clue === key) node.classList.add("active");
      });
      renderClues();
    }

    function progressLevel() {
      const current = state.levelIndex;
      if (current === levels.length - 1) {
        openResult("通关", "最后一扇门已经打开。你完成了整套密室闯关。", "🎆", "再来一轮", "留在这里", () => {
          state.levelIndex = 0;
          resetLevel(true);
          startSplash(2400, 14, "mixed");
        });
        return;
      }
      openResult(segmentLabel(current), "下一关已经解锁。", "🎉", "继续下一关", "留在这里", () => {
        state.levelIndex += 1;
        resetLevel(true);
      });
      if ((current + 1) % 3 === 0) {
        startSplash(1300, 6, "warm");
      }
    }

    function submitAnswer() {
      if (state.solved) return;
      const level = currentLevel();
      const answer = els.answerInput.value.trim().toUpperCase();
      if (!answer) {
        els.lockFeedback.textContent = "先输入密码或开锁方式。";
        return;
      }
      if (answer === level.answer) {
        state.solved = true;
        els.lockFeedback.textContent = "门锁打开了。";
        setSceneMessage(level.success);
        updateHeader();
        openResult(segmentLabel(state.levelIndex), "这扇门已经打开。你可以继续下一关。", "😄", "继续下一关", "先看看线索", progressLevel);
        if ((state.levelIndex + 1) % 3 === 0) {
          startSplash(1300, 6, "warm");
        }
      } else {
        els.lockFeedback.textContent = "不对，再对照线索想一想。";
        setSceneMessage("密码不对，继续找房间里的线索。");
      }
    }

    function bindScene() {
      document.querySelectorAll(".hotspot").forEach((node) => {
        node.addEventListener("click", () => {
          if (state.solved) return;
          const key = node.dataset.clue;
          markOpened(key);
          setSceneMessage(currentLevel().clues[key]);
        });
      });
    }

    els.submitBtn.addEventListener("click", submitAnswer);
    els.answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") submitAnswer();
    });
    els.clearBtn.addEventListener("click", () => {
      els.answerInput.value = "";
      els.lockFeedback.textContent = "";
    });
    els.hintBtn.addEventListener("click", () => {
      setHint(currentLevel().hint);
      setSceneMessage("提示已经显示在右侧。");
    });
    els.resetBtn.addEventListener("click", () => {
      resetLevel(true);
      setSceneMessage(`本关已重置。你回到了${currentLevel().name}。`);
    });
    els.nextBtn.addEventListener("click", () => {
      if (state.modalAction) {
        const action = state.modalAction;
        closeResult();
        action();
      }
    });
    els.modalPrimary.addEventListener("click", () => {
      if (state.modalAction) {
        const action = state.modalAction;
        closeResult();
        action();
      }
    });
    els.modalSecondary.addEventListener("click", closeResult);
    els.modal.addEventListener("click", (event) => {
      if (event.target === els.modal) closeResult();
    });
    window.addEventListener("resize", resizeSplash);
    window.addEventListener("resize", resizeScene);

    bindScene();
    renderLevel();
    resizeSplash();
    resizeScene();
    setSceneMessage("先点发光的物件找线索，线索会出现在右侧。");
  </script>
</body>
</html>
