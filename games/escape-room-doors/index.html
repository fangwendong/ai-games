<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>密室逃脱</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #e9ecef;
      --panel: rgba(255, 255, 255, 0.86);
      --line: rgba(34, 42, 52, 0.14);
      --ink: #1f2a33;
      --muted: #60707e;
      --accent: #2f6fed;
      --accent-2: #0f9d7a;
      --warn: #d19a00;
      --bad: #c74848;
      --shadow: 0 18px 48px rgba(22, 30, 41, 0.14);
      --room-w: min(48vw, 560px);
      --room-h: min(58vw, 480px);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(47, 111, 237, 0.14), transparent 28%),
        radial-gradient(circle at 82% 0%, rgba(15, 157, 122, 0.14), transparent 26%),
        linear-gradient(180deg, #f5f7fa 0%, var(--bg) 100%);
    }

    body {
      padding: 18px;
    }

    button, input {
      font: inherit;
    }

    .app {
      width: min(1220px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(300px, 1fr) 340px;
      gap: 18px;
      align-items: start;
    }

    .stage, .side {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .stage {
      min-height: calc(100vh - 36px);
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 10px;
      min-height: 34px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.66);
      font-size: 13px;
      white-space: nowrap;
    }

    .chip strong {
      color: var(--accent);
      font-weight: 800;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .guide {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .guide-step {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .guide-step strong {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #1f2a33;
      color: #fff;
      font-size: 12px;
    }

    .btn {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf2;
      color: var(--ink);
      cursor: pointer;
      font-weight: 800;
      box-shadow: inset 0 -3px 0 rgba(34, 42, 52, 0.06);
    }

    .btn.primary {
      background: #1f2a33;
      color: #fff;
      border-color: rgba(31, 42, 51, 0.68);
    }

    .room {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 14px;
      align-items: start;
    }

    .scene, .panel {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      overflow: hidden;
    }

    .scene {
      position: relative;
      aspect-ratio: 1672 / 941;
      background: #0f1318;
      overflow: hidden;
    }

    .scene-guide {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 3;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      color: #2f6fed;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 6px 20px rgba(31, 42, 51, 0.14);
      pointer-events: none;
    }

    .scene-canvas {
      position: absolute;
      inset: 0;
      width: 1672px;
      height: 941px;
      transform-origin: top left;
    }

    .scene-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
      filter: none;
    }

    .scene-haze {
      display: none;
    }

    .scene::after {
      display: none;
    }

    .window {
      position: absolute;
      left: 28px;
      top: 26px;
      width: 154px;
      height: 116px;
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.22)),
        linear-gradient(90deg, rgba(88, 144, 220, 0.82) 0 50%, rgba(88, 144, 220, 0.62) 50% 100%);
      border: 2px solid rgba(76, 112, 152, 0.28);
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.36), 0 12px 24px rgba(0, 0, 0, 0.08);
    }

    .window::before,
    .window::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.55);
    }

    .window::before {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 3px;
      transform: translateX(-50%);
    }

    .window::after {
      left: 0;
      right: 0;
      top: 50%;
      height: 3px;
      transform: translateY(-50%);
    }

    .curtain {
      position: absolute;
      top: 20px;
      width: 22px;
      height: 126px;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(232, 237, 245, 0.92), rgba(196, 210, 228, 0.92));
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.32);
    }

    .curtain.left { left: 18px; transform: rotate(4deg); transform-origin: top center; }
    .curtain.right { left: 186px; transform: rotate(-4deg); transform-origin: top center; }

    .sofa {
      position: absolute;
      left: 170px;
      bottom: 28px;
      width: 174px;
      height: 82px;
      border-radius: 18px 18px 10px 10px;
      background: linear-gradient(180deg, #8d694d, #6d4f3a);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.08), 0 10px 22px rgba(0, 0, 0, 0.1);
    }

    .sofa::before,
    .sofa::after {
      content: "";
      position: absolute;
      background: linear-gradient(180deg, #8d694d, #6d4f3a);
      border-radius: 12px;
    }

    .sofa::before {
      left: 10px;
      right: 10px;
      top: -18px;
      height: 30px;
    }

    .sofa::after {
      left: 16px;
      right: 16px;
      bottom: -10px;
      height: 14px;
      background: rgba(72, 48, 33, 0.4);
    }

    .rug {
      position: absolute;
      left: 126px;
      bottom: 18px;
      width: 246px;
      height: 104px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.38), transparent 22%),
        linear-gradient(180deg, #d9a67c, #b56f47);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.12);
      opacity: 0.92;
    }

    .cabinet {
      position: absolute;
      right: 198px;
      top: 202px;
      width: 96px;
      height: 108px;
      border-radius: 14px;
      background: linear-gradient(180deg, #b6a085, #8a725a);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
    }

    .cabinet::before,
    .cabinet::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.2);
    }

    .cabinet::before {
      left: 50%;
      top: 8px;
      bottom: 8px;
      width: 2px;
      transform: translateX(-50%);
    }

    .cabinet::after {
      left: 12px;
      right: 12px;
      top: 22px;
      height: 2px;
    }

    .clock {
      position: absolute;
      right: 56px;
      top: 36px;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffffff, #dce8f0 70%);
      border: 4px solid rgba(31, 42, 51, 0.12);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .clock::before,
    .clock::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 50%;
      background: #4a5b69;
      transform-origin: bottom center;
      border-radius: 999px;
    }

    .clock::before {
      width: 3px;
      height: 16px;
      transform: translateX(-50%) rotate(35deg);
    }

    .clock::after {
      width: 2px;
      height: 20px;
      transform: translateX(-50%) rotate(-20deg);
    }

    .fridge {
      left: 920px;
      top: 320px;
      width: 180px;
      height: 340px;
      border-radius: 14px;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
      padding: 0;
    }

    .fridge-back {
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .fridge-door {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(222, 231, 243, 0.1));
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-left: 2px solid rgba(255, 255, 255, 0.16);
      transform-origin: left center;
      transition: transform 360ms ease;
      z-index: 2;
      backdrop-filter: blur(1px);
    }

    .fridge-door::before,
    .fridge-door::after {
      content: "";
      position: absolute;
      right: 16px;
      border-radius: 999px;
      background: rgba(54, 82, 112, 0.56);
    }

    .fridge-door::before {
      top: 88px;
      width: 6px;
      height: 38px;
    }

    .fridge-door::after {
      top: 186px;
      width: 6px;
      height: 26px;
    }

    .fridge-inside {
      position: absolute;
      left: 12px;
      right: 20px;
      top: 18px;
      bottom: 14px;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(250, 252, 255, 0.7));
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 1;
    }

    .fridge-shelf {
      position: absolute;
      left: 10px;
      right: 28px;
      height: 4px;
      border-radius: 999px;
      background: rgba(98, 126, 158, 0.28);
    }

    .fridge-shelf.one { top: 52px; }
    .fridge-shelf.two { top: 146px; }

    .fridge-item {
      position: absolute;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(6px) scale(0.94);
      transition: opacity 180ms ease 120ms, transform 180ms ease 120ms;
      z-index: 1;
    }

    .fridge-item.milk {
      left: 22px;
      top: 32px;
      width: 18px;
      height: 22px;
      background: linear-gradient(180deg, #fff, #dce3f2);
    }

    .fridge-item.box {
      left: 56px;
      top: 30px;
      width: 24px;
      height: 18px;
      background: linear-gradient(180deg, #ffefbe, #d7b95d);
    }

    .fridge-item.note {
      left: 24px;
      top: 128px;
      width: 34px;
      height: 22px;
      background: linear-gradient(180deg, #fff8e9, #f2dca7);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .fridge-item.note::after {
      content: "线索";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 8px;
      color: #805d1a;
      font-weight: 800;
      letter-spacing: 0;
    }

    .fridge.open .fridge-door {
      transform: perspective(500px) rotateY(-72deg);
    }

    .fridge.open .fridge-inside,
    .fridge.revealed .fridge-inside,
    .fridge.open .fridge-item,
    .fridge.revealed .fridge-item {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .fridge.stage-1 {
      transform: translateX(2px) translateY(-2px);
    }

    .fridge.stage-2 {
      transform: translateX(3px) translateY(-1px);
    }

    .fridge.revealed {
      box-shadow: inset 0 0 0 2px rgba(31, 42, 51, 0.08), 0 12px 26px rgba(0, 0, 0, 0.16);
    }

    .wall {
      position: absolute;
      inset: 14px;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0)),
        linear-gradient(135deg, rgba(55, 68, 82, 0.08), transparent 35%),
        linear-gradient(45deg, rgba(255, 255, 255, 0.18), transparent 28%);
      box-shadow: inset 0 0 0 2px rgba(50, 60, 74, 0.08);
    }

    .floor {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      height: 26%;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0)),
        linear-gradient(180deg, #b7c2cf, #9eacb8);
    }

    .door {
      position: absolute;
      left: 1360px;
      top: 286px;
      width: 208px;
      height: 408px;
      border-radius: 18px 18px 12px 12px;
      background: transparent;
      box-shadow: none;
      border: 2px solid rgba(255, 214, 74, 0.06);
    }

    .door.locked::after {
      content: "锁";
      position: absolute;
      left: 50%;
      top: 166px;
      transform: translateX(-50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(245, 221, 150, 0.92);
      color: #5b4300;
      font-weight: 900;
      font-size: 20px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.18);
    }

    .door.open {
      background: transparent;
      border-color: rgba(156, 214, 175, 0.32);
    }

    .door.open::after {
      content: "门开了";
      position: absolute;
      left: 50%;
      top: 170px;
      transform: translateX(-50%);
      color: #fff;
      font-weight: 900;
      font-size: 18px;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
    }

    .hotspot {
      position: absolute;
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      overflow: visible;
      transform-origin: center center;
      will-change: transform, filter;
    }

    .hotspot::before {
      content: "查看";
      position: absolute;
      left: 10px;
      top: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(12, 16, 20, 0.74);
      color: #f4f7fa;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px) scale(0.96);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .hotspot::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 16px;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease, border-color 120ms ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .hotspot:hover::after {
      transform: translateY(-1px);
      box-shadow: 0 0 0 2px rgba(255, 214, 74, 0.18), 0 16px 34px rgba(0, 0, 0, 0.18);
    }

    .hotspot:hover::before {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .hotspot.active::after {
      background: rgba(255, 214, 74, 0.12);
      box-shadow: 0 0 0 2px rgba(255, 214, 74, 0.38), 0 0 30px rgba(255, 214, 74, 0.18);
    }

    .hotspot.stage-1::before {
      content: "再看";
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .hotspot.stage-2::before {
      content: "找到";
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -24px;
      font-size: 11px;
      color: #31414f;
      text-align: center;
      font-weight: 700;
      white-space: nowrap;
    }

    .item {
      position: absolute;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 0;
      background: transparent;
      box-shadow: none;
      color: transparent;
      user-select: none;
    }

    .item::after {
      content: "";
    }

    .bookcase {
      left: 405px;
      top: 230px;
      width: 190px;
      height: 520px;
      background: transparent;
    }

    .desk {
      left: 90px;
      top: 580px;
      width: 420px;
      height: 220px;
      background: transparent;
    }

    .lamp {
      left: 120px;
      top: 520px;
      width: 130px;
      height: 170px;
      background: transparent;
      box-shadow: none;
    }

    .picture {
      left: 650px;
      top: 365px;
      width: 180px;
      height: 170px;
      background: transparent;
    }

    .plant {
      left: 830px;
      top: 540px;
      width: 130px;
      height: 170px;
      background: transparent;
      box-shadow: none;
    }

    .panel {
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .panel h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel p, .panel ul {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .clue-list {
      display: grid;
      gap: 8px;
    }

    .clue {
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(47, 111, 237, 0.08);
      color: #2f4c77;
      border: 1px solid rgba(47, 111, 237, 0.14);
    }

    .lockbox {
      display: grid;
      gap: 10px;
      padding-top: 4px;
    }

    .lockbox input {
      width: 100%;
      min-height: 46px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      outline: none;
      letter-spacing: 0.12em;
      font-weight: 800;
    }

    .hint {
      padding: 12px;
      border-radius: 8px;
      background: rgba(15, 157, 122, 0.1);
      border: 1px solid rgba(15, 157, 122, 0.16);
      color: #216455;
      min-height: 54px;
    }

    .feed {
      min-height: 54px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(31, 42, 51, 0.06);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(18, 24, 31, 0.42);
      z-index: 20;
      padding: 18px;
    }

    .modal.visible {
      display: grid;
    }

    .modal-card {
      width: min(520px, 100%);
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fffdf8;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .modal-emoji {
      font-size: 64px;
      line-height: 1;
      text-align: center;
      animation: pop 360ms ease;
    }

    .modal-card h3 {
      margin: 0;
      font-size: 22px;
    }

    .modal-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .splash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 19;
      opacity: 0;
      transition: opacity 150ms ease;
    }

    .splash.visible { opacity: 1; }

    .lock-feedback {
      min-height: 24px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    @keyframes pop {
      0% { transform: scale(0.6); opacity: 0; }
      60% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes roomSweep {
      0% { background-position: -160% 0, 0 0; }
      100% { background-position: 160% 0, 0 0; }
    }

    @keyframes swayLeft {
      0%, 100% { transform: rotate(4deg) translateY(0); }
      50% { transform: rotate(2deg) translateY(2px); }
    }

    @keyframes swayRight {
      0%, 100% { transform: rotate(-4deg) translateY(0); }
      50% { transform: rotate(-2deg) translateY(2px); }
    }

    @keyframes tickHour {
      0% { transform: translateX(-50%) rotate(35deg); }
      100% { transform: translateX(-50%) rotate(395deg); }
    }

    @keyframes tickMinute {
      0% { transform: translateX(-50%) rotate(-20deg); }
      100% { transform: translateX(-50%) rotate(340deg); }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-3px) scale(1.01); }
    }

    @keyframes lampGlow {
      0%, 100% { filter: drop-shadow(0 4px 10px rgba(255, 214, 74, 0.48)) brightness(1); }
      50% { filter: drop-shadow(0 8px 16px rgba(255, 214, 74, 0.72)) brightness(1.12); }
    }

    @keyframes leafWiggle {
      0%, 100% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(-3deg) scale(1.03); }
    }

    @keyframes nudge {
      0% { transform: translateY(0) scale(1); }
      45% { transform: translateY(-5px) scale(1.02); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes revealPop {
      0% { transform: scale(0.96); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes cluePulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.16) inset; }
      50% { box-shadow: 0 0 0 2px rgba(47, 111, 237, 0.28) inset, 0 0 0 2px rgba(47, 111, 237, 0.08); }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: auto;
      }

      .room {
        grid-template-columns: 1fr;
      }

      :root {
        --room-w: 100%;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .stage {
        padding: 12px;
        gap: 10px;
      }

      .brand h1 {
        font-size: 26px;
      }

      .brand p,
      .chip {
        font-size: 12px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .controls .btn.primary {
        grid-column: 1 / -1;
      }

      .guide {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 12px;
        gap: 10px;
      }

      .panel h2 {
        font-size: 16px;
      }

      .panel p,
      .panel ul,
      .hint,
      .feed {
        font-size: 13px;
        line-height: 1.45;
      }

      .clue-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .scene {
        aspect-ratio: 560 / 420;
      }
    }
  </style>
</head>

  <script>
    const levels = [

      {

        clueTotal: 7,
        hint: "三个开关控制三盏灯，门旁边有图示：第一个和第三个需要打开。",
        clues: {
          bookcase: "走廊墙上贴着 1、2、3 三个开关的说明。",

      {

        clueTotal: 7,
        hint: "四张画的背面分别写着春、夏、秋、冬，只有顺序对了才开门。",
        clues: {
          bookcase: "书架上季节书签的顺序是春、夏、秋、冬。",
          desk: "桌上四张画编号 4、1、3、2。",

          picture: "画框后写着“先春后冬”。",

      {

        hint: "档案袋按 A1、A2、B1、B2 排列，角落贴了 2 个红点和 1 个蓝点。",
        clues: {
          bookcase: "档案柜上贴着 A、B 两组，每组两个。",

        },
        answer: "221",
        success: "先数红点 2 个，再数蓝点 1 个，再数白点 1 个。"
      },
      {

        clueTotal: 7,
        hint: "地图上箭头指向左、上、右。门锁需要按方向输入。",
        clues: {
          bookcase: "地图边上写着 L、U、R。",
          desk: "纸条上有 → ← ↑。",
          lamp: "灯罩阴影投出方向：左、上、右。",
          picture: "画框里是一条折线，方向依次是左上右。",
          plant: "盆里卡片写着 LUR。",
          panel: "这个锁要输入方向缩写。",
          fridge: "冰箱门把手旁写着 LUR。"
        },
        answer: "LUR",
        success: "方向顺序是左、上、右。"
      },
      {
        name: "第七关：冷库",
        clueTotal: 7,
        hint: "温度表显示 4、1、7，门锁要求把最小数放前面。",
        clues: {
          bookcase: "箱子标签是 7、4、1。",
          desk: "桌上有一张纸：把数字从小到大排。",
          lamp: "灯光照出 4、1、7 三个数字。",
          picture: "画框背后写着 147。",
          plant: "盆里卡片写着 417。",
          panel: "按升序输入三位数。",
          fridge: "冰箱上层贴纸标着 4，1，7。"
        },
        answer: "147",
        success: "把数字从小到大排，得到 147。"
      },
      {
        name: "第八关：终门",
        clueTotal: 7,
        hint: "把前面几关的最终数字串起来，就能开最后的门。",
        clues: {
          bookcase: "书脊写着 3、5、1、4。",
          desk: "桌上有一张总表：325 / GYR / 101 / 4132 / 221 / LUR / 147。",
          lamp: "灯光把总表中每组的首位数字打亮。",
          picture: "画框里写着“看每组的第一个数字”。",
          plant: "盆底有一行字：3 1 1 4。",
          panel: "终门需要输入 3114。",
          fridge: "冰箱里挂着一串数字牌：3、1、1、4。"
        },
        answer: "3114",
        success: "把前面几组最终数字的首位连起来：3、1、1、4。"
      }
    ];

    const state = {
      levelIndex: 0,
      opened: new Set(),
      cluesFound: new Set(),
      input: "",
      solved: false,
      modalAction: null,
      splash: null,
      splashFrame: 0,
      fridgeOpen: false,
      fridgeRevealed: false,
      fridgeTimer: null,
      objectStages: {}
    };

    const els = {
      levelText: document.querySelector("#levelText"),
      clueText: document.querySelector("#clueText"),
      clueTotalText: document.querySelector("#clueTotalText"),
      statusText: document.querySelector("#statusText"),
      scene: document.querySelector("#scene"),
      sceneCanvas: document.querySelector("#sceneCanvas"),
      door: document.querySelector("#door"),
      clueList: document.querySelector("#clueList"),
      answerInput: document.querySelector("#answerInput"),
      submitBtn: document.querySelector("#submitBtn"),
      clearBtn: document.querySelector("#clearBtn"),
      hintBtn: document.querySelector("#hintBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      nextBtn: document.querySelector("#nextBtn"),
      feed: document.querySelector("#feed"),
      hintBox: document.querySelector("#hintBox"),
      lockFeedback: document.querySelector("#lockFeedback"),
      modal: document.querySelector("#modal"),
      modalEmoji: document.querySelector("#modalEmoji"),
      modalTitle: document.querySelector("#modalTitle"),
      modalBody: document.querySelector("#modalBody"),
      modalPrimary: document.querySelector("#modalPrimary"),
      modalSecondary: document.querySelector("#modalSecondary"),
      splash: document.querySelector("#splash"),
      splashCtx: document.querySelector("#splash").getContext("2d")
    };

    const clueNodes = {
      bookcase: document.createElement("div"),
      desk: document.createElement("div"),
      lamp: document.createElement("div"),
      picture: document.createElement("div"),
      plant: document.createElement("div"),
      panel: document.createElement("div")
    };

    function currentLevel() {
      return levels[state.levelIndex];
    }

    function segmentLabel(index) {
      if (index < 2) return `第 ${index + 1} 关`;
      return `第 ${index + 1} 关`;
    }

    function renderClues() {
      const level = currentLevel();
      els.clueList.innerHTML = "";
      const keys = ["bookcase", "desk", "lamp", "picture", "plant", "panel", "fridge"];
      keys.forEach((key) => {
        const div = document.createElement("div");
        div.className = "clue";
        div.textContent = state.cluesFound.has(key) ? level.clues[key] : "未发现";
        els.clueList.appendChild(div);
      });
      els.clueText.textContent = `${state.cluesFound.size}`;
      els.clueTotalText.textContent = `${level.clueTotal}`;
    }

    function setSceneMessage(text) {
      els.feed.textContent = text;
    }

    function setHint(text) {
      els.hintBox.textContent = text;
    }

    function updateHeader() {
      els.levelText.textContent = `${state.levelIndex + 1}`;
      els.statusText.textContent = state.solved ? "门开了" : "搜寻中";
      els.door.classList.toggle("open", state.solved);
      els.door.classList.toggle("locked", !state.solved);
      els.nextBtn.disabled = !state.solved;
    }

    function resetLevel(keepLevel = true) {
      state.opened.clear();
      state.cluesFound.clear();
      state.input = "";
      state.solved = false;
      state.fridgeOpen = false;
      state.fridgeRevealed = false;
      state.objectStages = {};
      if (state.fridgeTimer) {
        clearTimeout(state.fridgeTimer);
        state.fridgeTimer = null;
      }
      els.answerInput.value = "";
      els.lockFeedback.textContent = "";
      els.modal.classList.remove("visible");
      if (!keepLevel) state.levelIndex = 0;
      renderLevel();
    }

    function renderLevel() {
      const level = currentLevel();
      updateHeader();
      renderClues();
      setHint(level.hint);
      if (!state.solved) {
        setSceneMessage(`你进入了${level.name}。先找边框发亮的物件，有些要先点一下再翻开。`);
      }
      document.querySelectorAll(".hotspot").forEach((el) => {
        el.classList.remove("active", "stage-1", "stage-2", "open", "revealed");
      });
      els.answerInput.placeholder = state.levelIndex === 7 ? "输入密码或开门方式" : "输入密码或开锁方式";
      els.nextBtn.textContent = state.levelIndex === levels.length - 1 ? "通关" : "下一关";
    }

    function openResult(title, body, emoji, primaryLabel, secondaryLabel, onPrimary) {
      els.modalEmoji.textContent = emoji;
      els.modalTitle.textContent = title;
      els.modalBody.textContent = body;
      els.modalPrimary.textContent = primaryLabel;
      els.modalSecondary.textContent = secondaryLabel;
      state.modalAction = onPrimary;
      els.modal.classList.add("visible");
    }

    function closeResult() {
      els.modal.classList.remove("visible");
      state.modalAction = null;
    }

    function resizeSplash() {
      const dpr = window.devicePixelRatio || 1;
      els.splash.width = Math.floor(window.innerWidth * dpr);
      els.splash.height = Math.floor(window.innerHeight * dpr);
      els.splash.style.width = `${window.innerWidth}px`;
      els.splash.style.height = `${window.innerHeight}px`;
      els.splashCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function startSplash(duration, burstCount, colorMode = "mixed") {
      resizeSplash();
      const now = performance.now();
      state.splash = {
        start: now,
        duration,
        particles: [],
        bursts: Array.from({ length: burstCount }, (_, index) => ({
          at: now + index * (duration / burstCount),
          x: window.innerWidth * (0.2 + Math.random() * 0.6),
          y: window.innerHeight * (0.16 + Math.random() * 0.4),
          hue: colorMode === "warm" ? 35 + Math.random() * 20 : Math.random() * 360
        })),
        colorMode
      };
      els.splash.classList.add("visible");
      if (!state.splashFrame) {
        state.splashFrame = window.requestAnimationFrame(stepSplash);
      }
    }

    function resizeScene() {
      const width = els.scene.clientWidth || 1672;
      const height = els.scene.clientHeight || 941;
      const scale = Math.min(width / 1672, height / 941);
      els.sceneCanvas.style.transform = `scale(${scale})`;
    }

    function stepSplash(timestamp) {
      if (!state.splash) {
        state.splashFrame = 0;
        els.splashCtx.clearRect(0, 0, els.splash.width, els.splash.height);
        els.splash.classList.remove("visible");
        return;
      }
      const { start, duration, bursts, particles, colorMode } = state.splash;
      els.splashCtx.clearRect(0, 0, els.splash.width, els.splash.height);
      while (bursts.length && bursts[0].at <= timestamp) {
        const burst = bursts.shift();
        const count = colorMode === "warm" ? 18 : 32;
        for (let i = 0; i < count; i += 1) {
          const angle = (Math.PI * 2 * i) / count;
          const speed = (colorMode === "warm" ? 1.8 : 3.1) + Math.random() * 2.2;
          particles.push({
            x: burst.x,
            y: burst.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            gravity: colorMode === "warm" ? 0.05 : 0.07,
            life: colorMode === "warm" ? 42 : 56,
            hue: burst.hue + (Math.random() * 16 - 8),
            size: colorMode === "warm" ? 2 : 2.6
          });
        }
      }
      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.life -= 1;
        els.splashCtx.fillStyle = `hsla(${p.hue}, 90%, 62%, ${Math.max(0, p.life / 56)})`;
        els.splashCtx.beginPath();
        els.splashCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        els.splashCtx.fill();
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (timestamp - start > duration && !bursts.length && !particles.length) {
        state.splash = null;
        els.splash.classList.remove("visible");
      } else {
        state.splashFrame = window.requestAnimationFrame(stepSplash);
      }
    }

    function markOpened(key) {
      state.opened.add(key);
      document.querySelectorAll(".hotspot").forEach((node) => {
        if (node.dataset.clue === key) node.classList.add("active");
      });
      renderClues();
    }

    function setStage(node, key, stage) {
      node.classList.remove("stage-1", "stage-2", "open", "revealed");
      if (stage === 1) node.classList.add("stage-1");
      if (stage >= 2) node.classList.add("stage-2");
      state.objectStages[key] = stage;
    }

    function getStage(key) {
      return state.objectStages[key] || 0;
    }

    function revealObject(key, node) {
      const level = currentLevel();
      if (state.cluesFound.has(key)) {
        setSceneMessage(level.clues[key]);
        return;
      }
      markOpened(key);
      setStage(node, key, 2);
      setSceneMessage(level.clues[key]);
    }

    function inspectObject(node, key) {
      const stage = getStage(key);
      const level = currentLevel();

      if (key === "fridge") {
        if (stage === 0) {
          setStage(node, key, 1);
          state.fridgeOpen = true;
          node.classList.add("open");
          setSceneMessage("冰箱门被拉开了，里面还有牛奶盒和隔板，线索暂时没完全露出来。");
          state.fridgeTimer = window.setTimeout(() => {
            state.fridgeRevealed = true;
            node.classList.add("revealed");
            setStage(node, key, 2);
            setSceneMessage("冰箱里面的东西挪开了一点，再点一次，把藏着的纸条拿出来。");
          }, 900);
          return;
        }
        if (stage === 1 && !state.fridgeRevealed) {
          setSceneMessage("冰箱还没完全露开，等里面的东西让一让。");
          return;
        }
        revealObject(key, node);
        return;
      }

      if (stage === 0) {
        setStage(node, key, 1);
        const prompts = {
          bookcase: "你把书架里一本书往外拉，像是有夹层。",
          desk: "你拉开桌子抽屉，里面还有东西。",
          lamp: "你拨了下灯罩，光线换了个角度。",
          picture: "你把画框掀起来一点，后面像是藏着字。",
          plant: "你把花盆挪开，底下有痕迹。",
          panel: "面板亮了一下，像是还能再按一次。"
        };
        setSceneMessage(prompts[key] || "你试着碰了一下，感觉这里还能继续看。");
        return;
      }

      revealObject(key, node);
    }

    function progressLevel() {
      const current = state.levelIndex;
      if (current === levels.length - 1) {
        openResult("通关", "最后一扇门已经打开。你完成了整套密室闯关。", "🎆", "再来一轮", "留在这里", () => {
          state.levelIndex = 0;
          resetLevel(true);
          startSplash(2400, 14, "mixed");
        });
        return;
      }
      openResult(segmentLabel(current), "下一关已经解锁。", "🎉", "继续下一关", "留在这里", () => {
        state.levelIndex += 1;
        resetLevel(true);
      });
      if ((current + 1) % 3 === 0) {
        startSplash(1300, 6, "warm");
      }
    }

    function submitAnswer() {
      if (state.solved) return;
      const level = currentLevel();
      const answer = els.answerInput.value.trim().toUpperCase();
      if (!answer) {
        els.lockFeedback.textContent = "先输入密码或开锁方式。";
        return;
      }
      if (answer === level.answer) {
        state.solved = true;
        els.lockFeedback.textContent = "门锁打开了。";
        setSceneMessage(level.success);
        updateHeader();
        openResult(segmentLabel(state.levelIndex), "这扇门已经打开。你可以继续下一关。", "😄", "继续下一关", "先看看线索", progressLevel);
        if ((state.levelIndex + 1) % 3 === 0) {
          startSplash(1300, 6, "warm");
        }
      } else {
        els.lockFeedback.textContent = "不对，再对照线索想一想。";
        setSceneMessage("密码不对，继续找房间里的线索。");
      }
    }

    function bindScene() {
      document.querySelectorAll(".hotspot").forEach((node) => {
        node.addEventListener("click", () => {
          if (state.solved) return;
          inspectObject(node, node.dataset.clue);
        });
      });
    }

    els.submitBtn.addEventListener("click", submitAnswer);
    els.answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") submitAnswer();
    });
    els.clearBtn.addEventListener("click", () => {
      els.answerInput.value = "";
      els.lockFeedback.textContent = "";
    });
    els.hintBtn.addEventListener("click", () => {
      setHint(currentLevel().hint);
      setSceneMessage("提示已经显示在右侧。");
    });
    els.resetBtn.addEventListener("click", () => {
      resetLevel(true);
      setSceneMessage(`本关已重置。你回到了${currentLevel().name}。`);
    });
    els.nextBtn.addEventListener("click", () => {
      if (state.modalAction) {
        const action = state.modalAction;
        closeResult();
        action();
      }
    });
    els.modalPrimary.addEventListener("click", () => {
      if (state.modalAction) {
        const action = state.modalAction;
        closeResult();
        action();
      }
    });
    els.modalSecondary.addEventListener("click", closeResult);
    els.modal.addEventListener("click", (event) => {
      if (event.target === els.modal) closeResult();
    });
    window.addEventListener("resize", resizeSplash);
    window.addEventListener("resize", resizeScene);

    bindScene();
    renderLevel();
    resizeSplash();
    resizeScene();
    setSceneMessage("先找会发光的边框，再试冰箱和门锁。");
  </script>
</body>
</html>
